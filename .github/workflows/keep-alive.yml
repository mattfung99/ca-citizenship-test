name: keep-supabase-alive

# Supabase free-plan projects pause after 7 days of inactivity.
# This workflow performs real database WRITES to prevent that.
#
# Why a write:
#   - A read as the anon role returns 0 rows under RLS, and Supabase does not
#     reliably count that as activity (the project paused right after a
#     "successful" read-ping). Updating a row is an unambiguous activity signal.
#
# Why several requests, several times a day (not one write once a day):
#   - Supabase's docs define "sufficient activity" as "a few user requests to
#     the database each day over the previous week." A single request per day
#     sits right at that threshold — a daily-only ping still triggered a pause
#     WARNING while the writes were landing (HTTP 204), because one request/day
#     read as "too few."
#   - GitHub's scheduled runs are best-effort: they can be delayed by hours or
#     dropped, and GitHub disables schedules after 60 days with no repo commits.
#     Running 3x/day means even if two runs drop, that day still gets requests.
#   - Each run issues PINGS_PER_RUN writes, so a surviving run alone clears the
#     "a few requests" bar for the day.
#
# No secrets required — the public anon key lives in src/config.js; the writes
# are single-row UPDATEs on the keep_alive table (migration 20260708000000),
# which grants UPDATE to anon and is capped at one row by a singleton constraint.
#
# To trigger manually: Actions tab -> "keep-supabase-alive" -> Run workflow.

on:
  schedule:
    - cron: "0 1,9,17 * * *"   # 3x/day (01:00, 09:00, 17:00 UTC)
  workflow_dispatch:

jobs:
  ping:
    name: Ping database
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ping database
        env:
          PINGS_PER_RUN: "3"      # a few requests per run to clear "a few/day"
        run: |
          python3 - <<'EOF'
          import json, os, re, sys, time, datetime, urllib.request, urllib.error

          text = open("src/config.js").read()
          url  = re.search(r"SUPABASE_URL\s+=\s+'([^']+)'", text).group(1)
          key  = re.search(r"SUPABASE_ANON_KEY\s+=\s+'([^']+)'", text).group(1)

          pings = int(os.environ.get("PINGS_PER_RUN", "3"))
          print(f"Pinging {url} (write x{pings}) ...")

          def ping():
              now = datetime.datetime.now(datetime.timezone.utc).isoformat()
              # UPDATE the singleton keep_alive row. Prefer: return=minimal so no
              # SELECT grant is needed; a 2xx (204) means the write reached Postgres.
              req = urllib.request.Request(
                  f"{url}/rest/v1/keep_alive?id=eq.1",
                  method="PATCH",
                  data=json.dumps({"pinged_at": now}).encode(),
                  headers={
                      "apikey": key,
                      "Authorization": f"Bearer {key}",
                      "Content-Type": "application/json",
                      "Prefer": "return=minimal",
                  },
              )
              with urllib.request.urlopen(req) as resp:
                  return resp.status

          for i in range(1, pings + 1):
              try:
                  status = ping()
                  print(f"  [{i}/{pings}] database write succeeded (HTTP {status}).")
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode(errors="replace")
                  print(f"::warning::[{i}/{pings}] HTTP {exc.code} — {body}")
                  print("The project may be paused. Check https://supabase.com/dashboard")
                  sys.exit(1)
              if i < pings:
                  time.sleep(2)   # space requests so they read as distinct activity
          EOF
