name: Keep Supabase Alive

# Supabase free-plan projects pause after 7 days of inactivity.
# This workflow fires a real database query every 5 days to prevent that.
#
# No secrets required — the anon key lives in src/config.js (intentionally
# public; security is enforced by Row Level Security on the database).
#
# To trigger manually: Actions tab → "Keep Supabase Alive" → Run workflow.

on:
  schedule:
    #        ┌─ minute  ┌─ hour  ┌─ day-of-month  ┌─ month  ┌─ day-of-week
    #        │          │        │                 │         │
    - cron: "0          12       1,6,11,16,21,26   *         *"
    # Runs on the 1st, 6th, 11th, 16th, 21st, 26th of every month at noon UTC.
    # Worst-case gap is 5 days — well within the 7-day inactivity window.
  workflow_dispatch:

jobs:
  ping:
    name: Ping database
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Ping database
        run: |
          python3 - <<'EOF'
          import re, sys, urllib.request, urllib.error

          text = open("src/config.js").read()
          url  = re.search(r"SUPABASE_URL\s+=\s+'([^']+)'", text).group(1)
          key  = re.search(r"SUPABASE_ANON_KEY\s+=\s+'([^']+)'", text).group(1)

          print(f"Pinging {url} …")
          # Query the attempts table with the anon key.
          # RLS ensures 0 rows are returned (auth.uid() is NULL for anon
          # requests and never matches any user_id), but the query still
          # reaches the database — which is what prevents the free-plan pause.
          # Requires: grant select on attempts to anon  (migration 20260627000000)
          req = urllib.request.Request(
              f"{url}/rest/v1/attempts?select=count",
              headers={
                  "apikey": key,
                  "Authorization": f"Bearer {key}",
                  "Accept": "application/json",
              },
          )
          try:
              with urllib.request.urlopen(req) as resp:
                  print(f"Database is active (HTTP {resp.status}).")
          except urllib.error.HTTPError as exc:
              print(f"::warning::HTTP {exc.code} — the project may already be paused.")
              print("Visit https://supabase.com/dashboard to check the project status.")
              sys.exit(1)
          EOF
