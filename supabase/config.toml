# Supabase CLI project configuration.
#
# Used for:
#   supabase link --project-ref <ref>   — link to an existing project
#   supabase db push                    — push local migrations without the GitHub integration
#   supabase migration new <name>       — scaffold a new migration file
#
# Update project_id when migrating to a new project.
# Run `supabase link --project-ref <NEW_REF>` to re-link the CLI.

project_id = "yoidkswlvmmqjhbgyzmd"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "https://mattfung99.github.io/ca-citizenship-test/"
additional_redirect_urls = ["https://mattfung99.github.io/ca-citizenship-test/"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# Sign-up is disabled; accounts are created by the admin only.
enable_signup = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false

[storage]
enabled = false
